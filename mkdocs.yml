site_name: CachyOS Tweaks
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/<your-username>/cachyos-tweaks

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Power Management: power-management.md
  - Display & Audio: display-audio.md
  - GPU Tuning: gpu-tuning.md
  - CPU & Cooling: cpu-cooling.md
  - Gaming: gaming.md
  - Game Tools: game-tools.md
  - Desktop: desktop.md
