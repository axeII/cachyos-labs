version: 5
daemon:
  log_level: info
  admin_group: wheel
  disable_clocks_cleanup: false
apply_settings_timer: 5
gpus:
  1002:7550-1043:061A-0000:0c:00.0:
    fan_control_enabled: true
    fan_control_settings:
      mode: curve
      static_speed: 0.3
      temperature_key: edge
      interval_ms: 500
      curve:
        30: 0.3
        45: 0.35
        60: 0.45
        78: 0.7
        92: 1.0
      spindown_delay_ms: 5000
      change_threshold: 2
    pmfw_options:
      zero_rpm: false
    power_cap: 317.0
    performance_level: auto
    voltage_offset: -30
profiles:
  forzahorizon6:
    gpus:
      1002:7550-1043:061A-0000:0c:00.0:
        fan_control_enabled: true
        fan_control_settings:
          mode: curve
          static_speed: 0.3
          temperature_key: edge
          interval_ms: 500
          curve:
            30: 0.3
            45: 0.35
            60: 0.45
            78: 0.7
            92: 1.0
          spindown_delay_ms: 5000
          change_threshold: 2
        pmfw_options:
          zero_rpm: false
        power_cap: 317.0
        performance_level: auto
        voltage_offset: 0
    rule:
      type: process
      filter:
        name: forzahorizon6.exe
auto_switch_profiles: true
